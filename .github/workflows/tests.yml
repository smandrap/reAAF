name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute dependency cache key
        id: dep-key
        shell: bash
        run: |
          echo "key=${{ runner.os }}-deps-$(git rev-parse HEAD:extern/Catch2 | head -c12)-$(git rev-parse HEAD:extern/LibAAF | head -c12)-$(git rev-parse HEAD:extern/WDL | head -c12)" >> $GITHUB_OUTPUT

      - name: Cache compiled dependencies (Catch2 + LibAAF)
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            build/extern/Catch2
            build/extern/LibAAF
          key: ${{ steps.dep-key.outputs.key }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Touch cached dependency artifacts
        if: steps.cache-deps.outputs.cache-hit == 'true'
        shell: bash
        run: find build/extern -name "*.a" -exec touch {} +

      - name: Build tests
        run: cmake --build build --target all_tests

      - name: Run tests
        run: ctest --test-dir build/tests --output-on-failure
