name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get WDL SHA for cache key
        id: wdl-key
        shell: bash
        run: |
          WDL_SHA=$(git ls-remote https://github.com/justinfrankel/WDL.git HEAD | cut -f1 | head -c12)
          echo "key=wdl-${WDL_SHA}" >> $GITHUB_OUTPUT

      - name: Cache WDL headers
        id: cache-wdl
        uses: actions/cache@v4
        with:
          path: extern/reaper-sdk/WDL
          key: ${{ steps.wdl-key.outputs.key }}

      - name: Fetch WDL headers
        if: steps.cache-wdl.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p extern/reaper-sdk
          git clone --depth 1 https://github.com/justinfrankel/WDL.git /tmp/WDL
          mv /tmp/WDL/WDL extern/reaper-sdk/WDL

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build tests
        run: cmake --build build --target all_tests

      - name: Run tests
        run: ctest --test-dir build/tests --output-on-failure
