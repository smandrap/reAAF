name: Build & Release REAPER Extension

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0). Leave empty for build-only, no release.'
        required: false
        default: ''

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x86_64
            cmake_arch_flag: ""
          - os: macos-latest
            arch: arm64
            cmake_arch_flag: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - os: macos-14
            arch: x86_64
            cmake_arch_flag: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
          - os: ubuntu-latest
            arch: x86_64
            cmake_arch_flag: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone REAPER SDK and WDL
        shell: bash
        run: |
          git clone --depth 1 https://github.com/justinfrankel/reaper-sdk.git extern/reaper-sdk
          cd extern/reaper-sdk
          git remote add wdl https://github.com/justinfrankel/WDL.git
          git fetch wdl
          git config user.email "ci@reaaF"
          git config user.name "CI"
          git merge --allow-unrelated-histories wdl/main

      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install PHP (macOS)
        if: runner.os == 'macOS'
        run: brew install php

      - name: Install PHP (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y php-cli

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_arch_flag }}

      - name: Build
        run: cmake --build build --config Release

      - name: Strip debug symbols (macOS)
        if: runner.os == 'macOS'
        run: strip -x build/reaper_reAAF.dylib

      - name: Strip debug symbols (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: strip build/reaper_reAAF.so

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: reaper-aaf-windows-x86_64
          path: build/Release/reaper_reAAF.dll

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: reaper-aaf-macos-${{ matrix.arch }}
          path: build/reaper_reAAF.dylib

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: reaper-aaf-linux-x86_64
          path: build/reaper_reAAF.so

      - name: Cleanup dependencies
        shell: bash
        run: |
          rm -rf extern/reaper-sdk

  release:
    if: startsWith(github.ref, 'refs/tags/') || inputs.version != ''
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Strip leading 'v' for changelog lookup
          echo "version_bare=${VERSION#v}" >> $GITHUB_OUTPUT
          # Detect pre-release: version contains -betaN
          if [[ "$VERSION" =~ -beta[0-9]+$ ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (manual trigger only)
        if: inputs.version != ''
        run: |
          git tag ${{ steps.ver.outputs.version }}
          git push origin ${{ steps.ver.outputs.version }}

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.ver.outputs.version_bare }}"
          BODY=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md | sed '/./,$!d')
          if [ -z "$BODY" ]; then
            BODY="No changelog entry found for $VERSION."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Rename artifacts for release
        shell: bash
        run: |
          mkdir release-files
          cp artifacts/reaper-aaf-windows-x86_64/reaper_reAAF.dll   release-files/reaper_reAAF-x86_64.dll
          cp artifacts/reaper-aaf-macos-arm64/reaper_reAAF.dylib     release-files/reaper_reAAF-arm64.dylib
          cp artifacts/reaper-aaf-macos-x86_64/reaper_reAAF.dylib    release-files/reaper_reAAF-x86_64.dylib
          cp artifacts/reaper-aaf-linux-x86_64/reaper_reAAF.so       release-files/reaper_reAAF-x86_64.so

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: false
          name: ${{ steps.ver.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: release-files/*
