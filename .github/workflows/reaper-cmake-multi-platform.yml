name: Build REAPER Extension

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x86_64
            cmake_arch_flag: ""
          - os: macos-latest
            arch: arm64
            cmake_arch_flag: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - os: macos-14
            arch: x86_64
            cmake_arch_flag: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
          - os: ubuntu-latest
            arch: x86_64
            cmake_arch_flag: ""

    runs-on: ${{ matrix.os }}

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Clone dependencies
      - name: Clone REAPER SDK, WDL, and LibAAF
        run: |
          git clone --depth 1 https://github.com/justinfrankel/reaper-sdk.git extern/reaper-sdk
          git clone --depth 1 https://github.com/justinfrankel/WDL.git extern/reaper-sdk/WDL
          git clone --depth 1 https://github.com/agfline/LibAAF.git extern/LibAAF

      # 3️⃣ Flatten WDL folder for REAPER SDK
      - name: Flatten WDL folder
        shell: bash
        run: |
          if [ -d extern/reaper-sdk/WDL/WDL ]; then
            mv extern/reaper-sdk/WDL/WDL extern/reaper-sdk/WDL-temp
            rm -rf extern/reaper-sdk/WDL
            mv extern/reaper-sdk/WDL-temp extern/reaper-sdk/WDL
          fi

      # 4️⃣ Create missing LibAAF version.h
      - name: Create LibAAF version.h
        shell: bash
        run: |
          mkdir -p extern/LibAAF/include/libaaf
          cat <<'EOF' > extern/LibAAF/include/libaaf/version.h
          #ifndef REAPER_AAF_VERSION_H
          #define REAPER_AAF_VERSION_H
          #define LIBAAF_VERSION "v0.0.0-unknown"
          #endif //REAPER_AAF_VERSION_H
          EOF

      # 5️⃣ Patch LibAAF for Windows (STGTY_* constants)
      - name: Patch LibAAF for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          sed -i "1i#include <windows.h>\n#include <objbase.h>" extern/LibAAF/src/LibCFB/CFBDump.c
          sed -i "1i#ifdef _MSC_VER\n#include <windows.h>\n#include <objbase.h>\n#endif" extern/LibAAF/src/LibCFB/LibCFB.c

      # 6️⃣ Setup MSVC on Windows
      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      # 7️⃣ Configure CMake
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_arch_flag }}

      # 8️⃣ Build
      - name: Build
        run: cmake --build build --config Release

      # 9️⃣ Strip debug symbols (macOS)
      - name: Strip debug symbols (macOS)
        if: runner.os == 'macOS'
        run: strip -x build/reaper_reAAF.dylib

      # 🔟 Upload artifacts
      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: reaper-aaf-windows-x86_64
          path: build/Release/reaper_reAAF.dll

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: reaper-aaf-macos-${{ matrix.arch }}
          path: build/reaper_reAAF.dylib

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: reaper-aaf-linux-x86_64
          path: build/reaper_reAAF.so

      # Cleanup
      - name: Cleanup dependencies
        shell: bash
        run: |
          rm -rf extern/reaper-sdk
          rm -rf extern/LibAAF

  release:
    # Only run when triggered by a version tag, after all builds succeed
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Rename artifacts for release
        shell: bash
        run: |
          mkdir release-files
          cp artifacts/reaper-aaf-windows-x86_64/reaper_reAAF.dll   release-files/reaper_reAAF-windows-x86_64.dll
          cp artifacts/reaper-aaf-macos-arm64/reaper_reAAF.dylib     release-files/reaper_reAAF-arm64.dylib
          cp artifacts/reaper-aaf-macos-x86_64/reaper_reAAF.dylib    release-files/reaper_reAAF-x86_64.dylib
          cp artifacts/reaper-aaf-linux-x86_64/reaper_reAAF.so       release-files/reaper_reAAF-linux-x86_64.so

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          name: reAAF ${{ github.ref_name }}
          files: release-files/*
